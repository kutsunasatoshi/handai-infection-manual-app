<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ホーム画面への追加方法</title>
  <style>
    body {
      margin: 0;
      background: #f5f8f7;
      color: #172626;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.7;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.35;
      margin: 0 0 16px;
    }
    h2 {
      border-left: 5px solid #0f766e;
      font-size: 20px;
      margin: 28px 0 12px;
      padding-left: 10px;
    }
    .box {
      background: #fff;
      border: 1px solid #dce7e4;
      border-radius: 8px;
      padding: 16px;
    }
    li {
      margin: 8px 0;
    }
    a {
      color: #0f766e;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>感染管理マニュアルをスマホのホーム画面に追加する</h1>
    <p class="box">このページをSafariまたはChromeで開き、ホーム画面に追加すると、アプリのように起動できます。</p>

    <h2>iPhone</h2>
    <ol class="box">
      <li>SafariでマニュアルのURLを開く。</li>
      <li>画面下の共有ボタンを押す。</li>
      <li>「ホーム画面に追加」を選ぶ。</li>
      <li>名前を確認して「追加」を押す。</li>
    </ol>

    <h2>Android</h2>
    <ol class="box">
      <li>ChromeでマニュアルのURLを開く。</li>
      <li>右上のメニューを押す。</li>
      <li>「ホーム画面に追加」または「アプリをインストール」を選ぶ。</li>
      <li>案内に従って追加する。</li>
    </ol>

    <p><a href="/">マニュアルに戻る</a></p>
  </main>
</body>
</html>
