services:
  - type: web
    runtime: static
    name: handai-infection-manual
    buildCommand: npm ci && npm run export:web
    staticPublishPath: ./dist-test
    headers:
      - path: /
        name: Cache-Control
        value: no-cache
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /manuals/*.html
        name: Cache-Control
        value: no-cache
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manuals/assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /_expo/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
